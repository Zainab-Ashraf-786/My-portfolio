## Knowledge Base Topics

The RAG system should answer questions about:

1. **Bio**: Name, title, location, experience, pronouns
2. **Skills**: Tech stack, proficiency levels, categories
3. **Services**: Offerings, descriptions, tech tags, pricing (if applicable)
4. **Projects**: Project details, technologies, links
5. **Availability**: Current status, response time, booking process
6. **Contact**: Email, social links, preferred communication channels
7. **FAQs**: Common questions about hiring, rates, timeline, process

---

## Error Handling

| Error | Code | HTTP Status | User Message |
|-------|------|-------------|--------------|
| Empty message | EMPTY_MESSAGE | 400 | "Please enter a message" |
| Message too long | MESSAGE_TOO_LONG | 400 | "Message exceeds 500 characters" |
| RAG service down | SERVICE_UNAVAILABLE | 503 | "I'm having trouble connecting. Try emailing Zainab directly." |
| Rate limit exceeded | RATE_LIMITED | 429 | "Too many messages. Please wait a moment." |

---

## Security Considerations

**Phase 11 Requirements**:
- Rate limiting: 10 messages per minute per IP
- Input sanitization: Strip HTML, escape special characters
- CORS: Only allow portfolio domain
- API key: Required for RAG service (stored in environment variables)
- Logging: Log all queries for analytics (anonymized)

